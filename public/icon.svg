<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18a058"/>
      <stop offset="100%" stop-color="#36b374"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="85" stroke="url(#iconGrad)" stroke-width="6" fill="none" opacity="0.3"/>

  <!-- Database cylinders -->
  <g transform="translate(64, 68)">
    <!-- First cylinder -->
    <path d="M32 0C14.327 0 0 14.327 0 32s14.327 32 32 32 32-14.327 32-32S49.673 0 32 0z" fill="url(#iconGrad)" opacity="0.9"/>
    <path d="M0 32v48c0 17.673 14.327 32 32 32s32-14.327 32-32V32" fill="url(#iconGrad)"/>

    <!-- Cylinder lines -->
    <ellipse cx="32" cy="32" rx="32" ry="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <ellipse cx="32" cy="56" rx="32" ry="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <ellipse cx="32" cy="80" rx="32" ry="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

    <!-- Connection lines to second cylinder -->
    <path d="M96 56 L0 56" stroke="url(#accentGrad)" stroke-width="3" stroke-dasharray="6 4"/>
    <circle cx="96" cy="56" r="4" fill="url(#accentGrad)"/>
    <circle cx="0" cy="56" r="4" fill="url(#accentGrad)"/>
  </g>

  <!-- Second smaller cylinder (right side) -->
  <g transform="translate(140, 100)">
    <path d="M24 0C10.745 0 0 10.745 0 24s10.745 24 24 24 24-10.745 24-24S37.255 0 24 0z" fill="url(#accentGrad)" opacity="0.8"/>
    <path d="M0 24v36c0 13.255 10.745 24 24 24s24-10.745 24-24V24" fill="url(#accentGrad)" opacity="0.6"/>
    <ellipse cx="24" cy="24" rx="24" ry="9" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>

  <!-- U letter (for Uni) -->
  <text x="128" y="170" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="rgba(255,255,255,0.95)">Uni</text>

  <!-- Decorative dots -->
  <circle cx="48" cy="48" r="4" fill="url(#iconGrad)" opacity="0.6"/>
  <circle cx="208" cy="48" r="4" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="48" cy="208" r="4" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="208" cy="208" r="4" fill="url(#iconGrad)" opacity="0.6"/>
</svg>
